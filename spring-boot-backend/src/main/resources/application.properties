# Spring Boot Database Configuration Properties
spring.datasource.url=jdbc:mysql://localhost:3306/omni_sports_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root_secure_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config Details
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server Port Integration Configuration
server.port=8080

# Logging Levels Setup
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Kafka Configuration Properties
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Fallback config
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.consumer.group-id=omnisports-analytics-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

